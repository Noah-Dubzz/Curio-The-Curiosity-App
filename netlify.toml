[build]
  publish = "."
  functions = "netlify/functions"

# Increase function timeout to 26s (max on free tier) to avoid 504s
[functions]
  node_bundler = "esbuild"
  included_files = []

[functions."gemini"]
  timeout = 26

# Redirect /api/gemini → the serverless function
# The frontend never knows the difference
[[redirects]]
  from = "/api/gemini"
  to   = "/.netlify/functions/gemini"
  status = 200

# Redirect /api/transcribe → audio transcription function
[[redirects]]
  from = "/api/transcribe"
  to   = "/.netlify/functions/transcribe"
  status = 200

# Serve index.html for all other routes (SPA fallback)
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
